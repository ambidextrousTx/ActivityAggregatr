spring.kafka.consumer.group-id=leaderboard-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.leaderboard.*,com.score.*
spring.kafka.consumer.properties.spring.json.value.default.type=com.leaderboard.common.ScoreEvent

spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:file:./data/leaderboard
spring.jpa.hibernate.ddl-auto=update